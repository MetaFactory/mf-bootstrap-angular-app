<div class="error-page">
   <mat-icon name="error" color="danger" [size]="64"></mat-icon>
   <h2>Login failed!</h2>
   <p>{{ (errorMessage$ | async) ?? 'Please try again.' }}</p>
   <br />

   <app-row [gap]="1">
      <app-button (click)="goBack()" color="info">Go Back</app-button>
      <app-button href="/" variant="outlined" color="secondary">Home</app-button>
   </app-row>
</div>
